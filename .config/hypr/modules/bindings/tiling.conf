# close windows
bind = SUPER, W, killactive,
bind = CTRL ALT, DELETE, exec, close-windows

# control tiling
bind = SUPER, BACKSLASH, togglesplit,
bind = SUPER CTRL, P, pseudo,
bind = SUPER, T, togglefloating,
bind = SUPER, F, fullscreen, 0 # true fullscreen, hides bar
bind = SUPER CTRL, F, fullscreenstate, 0 2 # fake fullscreen, keeps bar
bind = SUPER ALT, F, fullscreen, 1 # maximize

# move focus with super + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# move focus with super + vim keys
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# move windows with super + shift + arrow keys
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# move windows with super + shift + vim keys
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# move active window to adjacent workspace
bind = SUPER ALT, bracketleft, exec, cycle-workspace prev window
bind = SUPER ALT, bracketright, exec, cycle-workspace next window

# tab through windows
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop

# move/resize windows with mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# move mode submap
bind = SUPER, M, submap, move
submap = move
binde = , right, moveactive, 30 0
binde = , left, moveactive, -30 0
binde = , up, moveactive, 0 -30
binde = , down, moveactive, 0 30
binde = , L, moveactive, 30 0
binde = , H, moveactive, -30 0
binde = , K, moveactive, 0 -30
binde = , J, moveactive, 0 30
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# resize mode submap
bind = SUPER, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
binde = , L, resizeactive, 30 0
binde = , H, resizeactive, -30 0
binde = , K, resizeactive, 0 -30
binde = , J, resizeactive, 0 30
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# cycle workspaces on current monitor
bind = SUPER CTRL, left, exec, cycle-workspace prev
bind = SUPER CTRL, right, exec, cycle-workspace next
bind = SUPER CTRL, H, exec, cycle-workspace prev
bind = SUPER CTRL, L, exec, cycle-workspace next

# scroll through workspaces on current monitor
bind = SUPER, mouse_down, exec, cycle-workspace next
bind = SUPER, mouse_up, exec, cycle-workspace prev

# switch workspaces with super + [1-3]
bind = SUPER, 1, split-workspace, 1
bind = SUPER, 2, split-workspace, 2
bind = SUPER, 3, split-workspace, 3

# move active window to workspace with super + shift + [1-3]
bind = SUPER SHIFT, 1, split-movetoworkspace, 1
bind = SUPER SHIFT, 2, split-movetoworkspace, 2
bind = SUPER SHIFT, 3, split-movetoworkspace, 3

# tab through workspaces
bind = SUPER, Tab, workspace, previous
# control scratchpad
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# focus monitor
bind = SUPER, bracketleft, focusmonitor, l
bind = SUPER, bracketright, focusmonitor, r

# move window to monitor
bind = SUPER SHIFT, bracketleft, movewindow, mon:l
bind = SUPER SHIFT, bracketright, movewindow, mon:r

# pin floating window across workspaces
bind = SUPER ALT, P, pin

# centre floating window
bind = SUPER ALT, C, centerwindow

# focus urgent/last window
bind = SUPER, U, focusurgentorlast
