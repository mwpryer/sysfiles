# system menu
bind = SUPER SHIFT, ESCAPE, exec, system-menu

# lock screen
bind = SUPER, ESCAPE, exec, lock-screen

# toggle idle
bind = SUPER CTRL, I, exec, toggle-idle

# toggle nightlight
bind = SUPER CTRL, N, exec, toggle-nightlight

# toggle desktop (hide/restore windows)
bind = SUPER CTRL, D, exec, toggle-desktop

# toggle window gaps
bind = SUPER SHIFT, BACKSPACE, exec, toggle-gaps

# toggle waybar
bind = SUPER SHIFT, SPACE, exec, toggle-waybar

# reload hyprland + waybar
bind = SUPER CTRL, R, exec, reload-desktop

# emoji picker
bind = SUPER CTRL, SPACE, exec, launch-walker -m symbols

# cycle audio output sinks
bind = SUPER ALT, A, exec, cycle-audio

# cycle webcam device
bind = SUPER ALT, D, exec, cycle-webcam

# cycle wallpaper
bind = SUPER ALT, B, exec, cycle-wallpaper

# notifications
bind = SUPER CTRL, COMMA, exec, toggle-notifications
bind = SUPER, COMMA, exec, makoctl dismiss
bind = SUPER SHIFT, COMMA, exec, makoctl dismiss --all
bind = SUPER, PERIOD, exec, makoctl invoke
bind = SUPER SHIFT, PERIOD, exec, makoctl restore

# screenshots + recording
bind = , PRINT, exec, take-screenshot smart
bind = SHIFT, PRINT, exec, take-screenshot fullscreen
bind = CTRL, PRINT, exec, take-screenshot smart copy
bind = ALT, PRINT, exec, take-screenshot windows
bind = SUPER, PRINT, exec, record-screen
bind = SUPER SHIFT, PRINT, exec, record-screen --with-audio
bind = SUPER ALT, PRINT, exec, record-screen --with-webcam
bind = SUPER SHIFT ALT, PRINT, exec, record-screen --with-audio --with-webcam
