source = $HOME/.config/hypr/themes/mocha.conf

$font = JetBrainsMono Nerd Font

general {
  hide_cursor = true
  ignore_empty_input = true
}

auth {
  fingerprint {
    enabled = true
  }
}

background {
  color = $base
}

# time
label {
  text = cmd[update:1000] date +"%H:%M"
  color = $text
  font_size = 64
  font_family = $font
  position = 0, 260
  halign = center
  valign = center
}

# date
label {
  text = cmd[update:30000] date +"%A, %d %B"
  color = $subtext0
  font_size = 18
  font_family = $font
  position = 0, 180
  halign = center
  valign = center
}

input-field {
  size = 280, 44
  outline_thickness = 1
  rounding = 4
  dots_size = 0.25
  dots_spacing = 0.3
  dots_center = true
  outer_color = $surface1
  inner_color = $surface0
  font_color = $text
  font_family = $font
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha">󰌾 Password</span>
  hide_input = false
  check_color = $green
  capslock_color = $yellow
  fail_color = $red
  fail_text = $FAIL <b>($ATTEMPTS)</b>
  halign = center
  valign = center
}

# status (wifi + battery)
label {
  text = cmd[update:30000] echo "$(wifi-status)  $(battery-status)"
  color = $text
  font_size = 12
  font_family = $font
  position = -16, -12
  halign = right
  valign = top
}
